name: andaloes
description: AnDaLoeS for Generators — rent generators across Egypt.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # i18n
  intl: ^0.20.2
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
