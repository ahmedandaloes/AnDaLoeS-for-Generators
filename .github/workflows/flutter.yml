name: Flutter CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --fatal-warnings

      - name: Test
        run: flutter test

  build-apk:
    name: Build Android APK (best-effort)
    runs-on: ubuntu-latest
    # android/ is gitignored by design (the authoritative native config —
    # compileSdk, manifest intent queries, signing — is maintained locally and
    # is NOT in the repo). CI regenerates a bare scaffold, so this build is
    # best-effort signal, not a hard gate. Analyze & Test is the real gate.
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    needs: analyze-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # android/ is gitignored (see CLAUDE.md), so CI must regenerate the native
      # Android scaffolding before it can build. Safe: only recreates platform
      # files, never touches lib/. Bump compileSdk/minSdk — plugins (file_picker,
      # flutter_plugin_android_lifecycle, …) require a newer SDK than the bare
      # template sets.
      - name: Regenerate Android platform files
        run: |
          flutter create --platforms=android --project-name andaloes .
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$f" ] || continue
            sed -i -E 's/compileSdk(Version)?[ =]+flutter\.compileSdkVersion/compileSdk = 36/' "$f"
            sed -i -E 's/minSdk(Version)?[ =]+flutter\.minSdkVersion/minSdk = 23/' "$f"
          done

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
